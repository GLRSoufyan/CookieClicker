<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Cookie Clicker</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f0f0; }
        #cookie { width: 200px; cursor: pointer; transition: transform 0.1s; }
        #cookie:active { transform: scale(0.9); }
        .stats { font-size: 1.5rem; margin: 20px; }
        .shop { display: flex; justify-content: center; gap: 20px; }
        .upgrade { padding: 10px; background: white; border: 2px solid #654321; border-radius: 8px; cursor: pointer; }
        .upgrade:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Cookie Clicker</h1>
    <div class="stats">
        Koekjes: <span id="cookie-count">0</span><br>
        <small>Per seconde: <span id="cps-count">0</span></small>
    </div>

    <img id="cookie" src="https://cdn-icons-png.flaticon.com/512/1047/1047711.png" alt="Cookie">

    <div class="shop">
        <button id="buy-auto" class="upgrade">Koop Auto-Clicker (Prijs: 10)</button>
    </div>

    <p><button id="save-btn">Handmatig Opslaan</button></p>

    <script src="main.js"></script>
</body>
</html>
